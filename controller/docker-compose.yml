services:
  jenkins-controller:
    image: jenkins/jenkins:lts
    container_name: jenkins-controller
    restart: unless-stopped
    ports:
      - "8080:8080"   # Jenkins Web UI
      - "50000:50000" # Inbound Agent port (JNLP/Websocket)
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    volumes:
      - jenkins_data:/var/jenkins_home
      # If you want to use the seed data from your backup:
      # - ./jenkins-backup:/usr/share/jenkins/ref:ro
    networks:
      - jenkins-net

volumes:
  jenkins_data:
    driver: local

networks:
  jenkins-net:
    driver: bridge
